<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connet Tools — Descarga de Utilidades</title>
    <meta
      name="description"
      content="Directorio centralizado de utilidades de IT, redes, sistemas y programación. Selecciona las herramientas que necesitas y genera tus descargas."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/png" sizes="32x32" href="./imagenes/Favicon_connet_01.png">

    <link rel="stylesheet" href="utilidades.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ===== ENCABEZADO ===== -->
    <header class="header">
      
      <nav class="head-content">
          <figure class="logo-pagina"><a href="https://connetsd.net/"><img src="./imagenes/logo-connet.webp" alt="logo-connet" class="logo-connet"></a></figure>
          <button class="menu-btn" id="menuBtn">☰</button>
          <ul class="nav-links nav-links-connet" id="navLinks">
              <li class="nav-link nav-link-connet"><a href="https://connetsd.net/">Inicio</a></li>
              <li class="nav-link nav-link-connet"><a href="https://connetsd.net/nosotros">Nosotros</a></li>
              <li class="nav-link nav-link-connet"><a href="https://connetsd.net/services">Servicios</a></li>
              <li class="nav-link nav-link-connet"><a href="https://connetsd.net/contacto">Contacto</a></li>
              <li class="nav-link nav-link-connet"><a href="https://codigobruno.online/ticket">Generación de Ticket</a></li>
              <li class="nav-link nav-link-connet"><a href="https://codigobruno.online/utilidades">Centro de Utilidades</a></li>
          </ul>
      </nav>

      <div class="header-inner">
        <!-- <div class="brand">
          <span class="brand-logo" aria-hidden="true">CT</span>
          <span class="brand-name">Connet Tools</span>
        </div> -->

        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input
            id="search"
            type="search"
            placeholder="Buscar herramienta..."
            aria-label="Buscar herramienta"
          />
        </div>

        <button id="theme-toggle" class="theme-toggle" aria-label="Activar modo oscuro">
          <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <line x1="12" y1="2" x2="12" y2="5"></line>
            <line x1="12" y1="19" x2="12" y2="22"></line>
            <line x1="2" y1="12" x2="5" y2="12"></line>
            <line x1="19" y1="12" x2="22" y2="12"></line>
            <line x1="4.9" y1="4.9" x2="7" y2="7"></line>
            <line x1="17" y1="17" x2="19.1" y2="19.1"></line>
            <line x1="4.9" y1="19.1" x2="7" y2="17"></line>
            <line x1="17" y1="7" x2="19.1" y2="4.9"></line>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
          </svg>
        </button>
      </div>
    </header>
    <script src="script-navbar.js"></script>

    <!-- ===== SECCIÓN PRINCIPAL (HERO) ===== -->
    <main class="main">
      <section class="hero">
        <h1>Descarga de Utilidades</h1>
        <p>
          Haz clic en cualquier herramienta para abrir su página oficial de
          descarga.
        </p>
      </section>

      <!-- Aquí JavaScript inserta las tarjetas automáticamente -->
      <div id="categories"></div>

      <p id="no-results" class="no-results" hidden>
        No se encontraron herramientas con ese nombre.
      </p>
    </main>

    <script src="utilidades.js"></script>
  </body>
</html>
