<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="./imagenes/icon-axolotl.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Ruda:wght@400..900&display=swap" rel="stylesheet">

    <title>Formulario e-mail</title>
</head>
<body>
    
    <div id="header-placeholder"></div>
    <script src="script-cabecera.js"></script>

    <main class="cont-main-formulario">
        <section class="formulario-card">
            <h2 class="titulo-formulario">¡Hablemos de tu próximo proyecto!</h2>
            <form action="https://formsubmit.co/325601c0ab12833a13d5008d68fa17b7" method="post">
                <label for="name">Nombre</label>
                <input type="text" id="name" name="name" placeholder="Juanito Alcachofa">
                
                <label for="email">Correo de contacto</label>
                <input type="email" id="email" name="email" placeholder="example@email.com">

                <label for="subject">Asunto</label>
                <input type="text" id="subject" name="subject" placeholder="Cotizacion de una landing page">

                <label for="comments">Comentarios / Detalles</label>
                <textarea id="comments" name="comments" cols="30" rows="10"></textarea>

                <input type="submit" name="Enviar" class="main-button">

                <input type="hidden" name="_next" value="https://codigobruno.online">
                <input type="hidden" name="_captcha" value="false">
            </form>
        </section>
    </main>
</body>
</html>
