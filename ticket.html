<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@100..900&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" sizes="32x32" href="./imagenes/icon-connet.png">

    <title>Ticket Connet:SD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header-generic">
        <figure class="logo-pagina"><a href="https://connetsd.net/"><img src="./imagenes/icon-connet.png" alt="logo-connet" class="logo-connet"></a></figure>
        <nav>
            <ul class="nav-links-connet">
                <li class="nav-link-connet"><a href="https://connetsd.net/">Inicio</a></li>
                <li class="nav-link-connet"><a href="https://connetsd.net/nosotros">Nosotros</a></li>
                <li class="nav-link-connet"><a href="https://connetsd.net/services">Servicios</a></li>
                <li class="nav-link-connet"><a href="https://connetsd.net/contacto">Contacto</a></li>
                <li class="nav-link-connet"><a href="#">Generación de Ticket</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <section class="card">            
            <section class="formulario-card">
                <h2 class="titulo-formulario">Levantamiento de ticket</h2>
                <form action="https://formsubmit.co/connetsd@gmail.com" method="post">

                <div class="pregunta-card">                    
                    <label>Empresa solicitante:</label>
                    <input type="text" name="empresa" placeholder="Ej: CONNeT">
                </div>

                <div class="pregunta-card">                    
                    <label>Departamento:</label>
                    <input type="text" name="departamento" placeholder="Ej: RRHH">
                </div>

                <div class="pregunta-card">                    
                    <label>Persona solicitante</label>
                    <input type="text" name="name" placeholder="Ej: Juan Gutierrez">
                </div>

                <div class="pregunta-card">                    
                    <label>Fecha:</label>
                    <input type="date" name="fecha">
                </div>

                <div class="pregunta-card">                    
                    <label>Prioridad:</label>
                    <select name="prioridad" required>
                        <option value="">Seleccione una opción</option>
                        <option value="Baja">Baja</option>
                        <option value="Mediana">Mediana</option>
                        <option value="Alta">Alta</option>
                        <option value="Urgente">Urgente</option>
                    </select>
                </div>

                <div class="pregunta-card">                    
                    <label>Tipo de solicitud:</label>
                    <select name="prioridad" required>
                        <option value="mantenimientoHRW">Mantenimiento de hardware</option>
                        <option value="instalacionSFTW">Instalacion de Software</option>
                        <option value="hrwNew">Hardware nuevo</option>
                        <option value="servicioImpresora">Servicio de impresoras</option>
                        <option value="redTelefonia">Red y telefonia</option>
                        <option value="serviciosMixtos">Servicios Mixtos</option>
                        <option value="otros">Otros</option>
                    </select>
                </div>
                
                <div class="pregunta-card">                    
                    <label>Descripción:</label>
                    <input type="text" name="tipoSolicitud" placeholder="Ej: Error en...">
                </div>
                
                <div class="pregunta-card">                    
                    <label>Articulo o servicio:</label>
                    <select name="articuloServicio" required>
                        <option value="articulo">Articulo</option>
                        <option value="servicio">Servicio</option>
                    </select>
                </div>
                
                <div class="pregunta-card">                    
                    <label>Descripcion:</label>
                    <input type="text" name="descripcion" placeholder="Ej: Mucho polvo en PC">
                </div>

                <div class="pregunta-card">                    
                </div>

                <input type="submit" name="Enviar" class="main-button">

                <input type="hidden" name="_next" value="https://connetsd.net">
                <input type="hidden" name="_captcha" value="false">
            </form>
        </section>
        </section>
    </main>
</body>
</html>
